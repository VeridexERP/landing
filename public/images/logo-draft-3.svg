<svg viewBox="0 0 240 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Draft 3: Logomark + wordmark — abstract V/checkmark icon -->
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square with abstract V/check -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="url(#iconGrad)"/>

  <!-- V shape built from two strokes — forms a check/verification mark -->
  <path d="M12 24 L18 32 L30 14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small sparkle dot -->
  <circle cx="32" cy="12" r="2.5" fill="white" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="52" y="35" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.03em" fill="#1e1233">
    veridex
  </text>
</svg>
