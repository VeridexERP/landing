<svg viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="16" fill="#f8f9fa"/>

  <!-- Old system (left) — crumbling, grey -->
  <g transform="translate(60, 60)">
    <!-- Old monitor -->
    <rect x="10" y="20" width="140" height="100" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="20" y="30" width="120" height="72" rx="4" fill="#f3f4f6"/>
    <!-- Static/broken screen lines -->
    <line x1="30" y1="50" x2="90" y2="50" stroke="#d1d5db" stroke-width="2"/>
    <line x1="30" y1="62" x2="110" y2="62" stroke="#d1d5db" stroke-width="2"/>
    <line x1="30" y1="74" x2="70" y2="74" stroke="#d1d5db" stroke-width="2"/>
    <line x1="80" y1="74" x2="130" y2="74" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
    <line x1="30" y1="86" x2="100" y2="86" stroke="#d1d5db" stroke-width="2"/>
    <!-- Error icon -->
    <circle cx="120" cy="46" r="8" fill="#ef4444" opacity="0.15"/>
    <text x="120" y="50" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">!</text>
    <!-- Monitor stand -->
    <rect x="60" y="120" width="40" height="8" rx="2" fill="#d1d5db"/>
    <rect x="50" y="128" width="60" height="6" rx="3" fill="#d1d5db"/>

    <!-- Scattered papers -->
    <rect x="170" y="60" width="50" height="65" rx="4" fill="#fff" stroke="#e5e7eb" stroke-width="1" transform="rotate(-8 195 92)"/>
    <rect x="180" y="50" width="50" height="65" rx="4" fill="#fff" stroke="#e5e7eb" stroke-width="1" transform="rotate(5 205 82)"/>
    <rect x="175" y="70" width="50" height="65" rx="4" fill="#fff" stroke="#e5e7eb" stroke-width="1" transform="rotate(-3 200 102)"/>

    <!-- Dust particles -->
    <circle cx="120" cy="160" r="2" fill="#d1d5db" opacity="0.5"/>
    <circle cx="180" cy="150" r="1.5" fill="#d1d5db" opacity="0.4"/>
    <circle cx="60" cy="155" r="1.5" fill="#d1d5db" opacity="0.3"/>

    <text x="110" y="185" font-family="sans-serif" font-size="12" font-weight="600" fill="#9ca3af" text-anchor="middle">Застарен софтвер</text>
    <text x="110" y="200" font-family="sans-serif" font-size="10" fill="#d1d5db" text-anchor="middle">комплициран, бавен, непрактичен</text>
  </g>

  <!-- Arrow / transformation -->
  <g transform="translate(340, 140)">
    <!-- Spark/lightning bolt -->
    <path d="M0 30 L20 30 L14 48 L40 18 L20 18 L26 0 Z" fill="#7c3aed" opacity="0.15"/>
    <path d="M50 20 L80 20" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="74,14 82,20 74,26" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="56" font-family="sans-serif" font-size="9" fill="#7c3aed" font-weight="600" text-anchor="middle">Veridex</text>
  </g>

  <!-- New system (right) — clean, modern, purple accents -->
  <g transform="translate(460, 40)">
    <!-- Clean dashboard -->
    <rect x="0" y="0" width="280" height="200" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
    <rect x="0" y="0" width="280" height="200" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>

    <!-- Top bar -->
    <rect x="0" y="0" width="280" height="40" rx="14" fill="#7c3aed" opacity="0.06"/>
    <circle cx="24" cy="20" r="6" fill="#7c3aed" opacity="0.2"/>
    <rect x="40" y="15" width="50" height="8" rx="3" fill="#7c3aed" opacity="0.15"/>
    <rect x="100" y="15" width="30" height="8" rx="3" fill="#7c3aed" opacity="0.08"/>
    <!-- Window controls -->
    <circle cx="240" cy="20" r="4" fill="#22c55e" opacity="0.3"/>
    <circle cx="254" cy="20" r="4" fill="#f59e0b" opacity="0.3"/>
    <circle cx="268" cy="20" r="4" fill="#ef4444" opacity="0.2"/>

    <!-- Dashboard content -->
    <!-- Stats row -->
    <g transform="translate(16, 52)">
      <rect width="78" height="50" rx="8" fill="#7c3aed" opacity="0.04"/>
      <text x="12" y="20" font-family="sans-serif" font-size="8" fill="#9ca3af">Вработени</text>
      <text x="12" y="38" font-family="sans-serif" font-size="18" font-weight="700" fill="#7c3aed">47</text>
    </g>
    <g transform="translate(102, 52)">
      <rect width="78" height="50" rx="8" fill="#22c55e" opacity="0.04"/>
      <text x="12" y="20" font-family="sans-serif" font-size="8" fill="#9ca3af">Возила</text>
      <text x="12" y="38" font-family="sans-serif" font-size="18" font-weight="700" fill="#22c55e">12</text>
    </g>
    <g transform="translate(188, 52)">
      <rect width="78" height="50" rx="8" fill="#f59e0b" opacity="0.04"/>
      <text x="12" y="20" font-family="sans-serif" font-size="8" fill="#9ca3af">Фактури</text>
      <text x="12" y="38" font-family="sans-serif" font-size="18" font-weight="700" fill="#f59e0b">156</text>
    </g>

    <!-- Mini chart -->
    <g transform="translate(16, 114)">
      <rect width="248" height="72" rx="8" fill="#7c3aed" opacity="0.02"/>
      <polyline
        points="0,50 25,42 50,48 75,30 100,35 125,20 150,25 175,12 200,18 225,8 248,14"
        stroke="#7c3aed"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
        transform="translate(8, 8)"
      />
      <path
        d="M8,58 L8,50 25,42 50,48 75,30 100,35 125,20 150,25 175,12 200,18 225,8 248,14 256,14 256,58 Z"
        fill="#7c3aed"
        opacity="0.06"
        transform="translate(0, 8)"
      />
    </g>

    <text x="140" y="240" font-family="sans-serif" font-size="12" font-weight="600" fill="#7c3aed" text-anchor="middle">Модерен, брз, едноставен</text>
    <text x="140" y="255" font-family="sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">направен за македонски бизниси</text>
  </g>

  <!-- People silhouettes at bottom -->
  <g transform="translate(320, 300)" opacity="0.12">
    <circle cx="0" cy="0" r="10" fill="#7c3aed"/>
    <rect x="-8" y="12" width="16" height="20" rx="6" fill="#7c3aed"/>
    <circle cx="30" cy="-4" r="10" fill="#7c3aed"/>
    <rect x="22" y="8" width="16" height="20" rx="6" fill="#7c3aed"/>
    <circle cx="60" cy="2" r="10" fill="#7c3aed"/>
    <rect x="52" y="14" width="16" height="20" rx="6" fill="#7c3aed"/>
    <circle cx="90" cy="-2" r="10" fill="#7c3aed"/>
    <rect x="82" y="10" width="16" height="20" rx="6" fill="#7c3aed"/>
    <circle cx="120" cy="0" r="10" fill="#7c3aed"/>
    <rect x="112" y="12" width="16" height="20" rx="6" fill="#7c3aed"/>
  </g>
  <text x="380" y="360" font-family="sans-serif" font-size="10" fill="#d1d5db" text-anchor="middle">Мал тим, голема визија</text>
</svg>
