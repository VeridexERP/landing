<svg viewBox="0 0 800 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="320" rx="16" fill="#f8f9fa"/>

  <!-- Dashboard frame -->
  <rect x="40" y="24" width="720" height="272" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="40" y="24" width="720" height="44" rx="12" fill="#fafafa"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="72" cy="46" r="10" fill="#7c3aed" opacity="0.1"/>
  <rect x="90" y="40" width="80" height="10" rx="4" fill="#7c3aed" opacity="0.15"/>
  <rect x="620" y="38" width="100" height="16" rx="8" fill="#7c3aed" opacity="0.08"/>

  <!-- Vehicle cards row -->
  <!-- Card 1: Active -->
  <g transform="translate(60, 84)">
    <rect width="210" height="88" rx="10" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="6" fill="#22c55e"/>
    <rect x="34" y="14" width="60" height="8" rx="3" fill="#1f2937" opacity="0.7"/>
    <rect x="130" y="14" width="60" height="16" rx="8" fill="#22c55e" opacity="0.12"/>
    <text x="160" y="26" font-family="sans-serif" font-size="9" fill="#22c55e" font-weight="600" text-anchor="middle">На тура</text>
    <rect x="16" y="42" width="180" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="16" y="42" width="140" height="4" rx="2" fill="#22c55e" opacity="0.4"/>
    <text x="16" y="66" font-family="sans-serif" font-size="10" fill="#9ca3af">Скопје → Битола</text>
    <text x="16" y="80" font-family="sans-serif" font-size="9" fill="#d1d5db">SK-1234-AB</text>
  </g>

  <!-- Card 2: Service -->
  <g transform="translate(295, 84)">
    <rect width="210" height="88" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="6" fill="#f59e0b"/>
    <rect x="34" y="14" width="60" height="8" rx="3" fill="#1f2937" opacity="0.7"/>
    <rect x="130" y="14" width="60" height="16" rx="8" fill="#f59e0b" opacity="0.12"/>
    <text x="160" y="26" font-family="sans-serif" font-size="9" fill="#f59e0b" font-weight="600" text-anchor="middle">Сервис</text>
    <rect x="16" y="44" width="120" height="6" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="16" y="66" font-family="sans-serif" font-size="10" fill="#9ca3af">Замена на масло + филтер</text>
    <text x="16" y="80" font-family="sans-serif" font-size="9" fill="#d1d5db">SK-5678-CD</text>
  </g>

  <!-- Card 3: Parked -->
  <g transform="translate(530, 84)">
    <rect width="210" height="88" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="6" fill="#d1d5db"/>
    <rect x="34" y="14" width="60" height="8" rx="3" fill="#1f2937" opacity="0.7"/>
    <rect x="130" y="14" width="60" height="16" rx="8" fill="#e5e7eb"/>
    <text x="160" y="26" font-family="sans-serif" font-size="9" fill="#9ca3af" font-weight="600" text-anchor="middle">Слободно</text>
    <rect x="16" y="44" width="80" height="6" rx="3" fill="#e5e7eb"/>
    <text x="16" y="66" font-family="sans-serif" font-size="10" fill="#9ca3af">Паркирано — база</text>
    <text x="16" y="80" font-family="sans-serif" font-size="9" fill="#d1d5db">SK-9012-EF</text>
  </g>

  <!-- Bottom stats row -->
  <g transform="translate(60, 192)">
    <rect width="155" height="86" rx="10" fill="#7c3aed" opacity="0.04"/>
    <text x="16" y="28" font-family="sans-serif" font-size="10" fill="#9ca3af">Возила на тура</text>
    <text x="16" y="56" font-family="sans-serif" font-size="28" font-weight="700" fill="#7c3aed">8</text>
    <text x="48" y="56" font-family="sans-serif" font-size="12" fill="#9ca3af">/ 15</text>
  </g>
  <g transform="translate(235, 192)">
    <rect width="155" height="86" rx="10" fill="#f59e0b" opacity="0.04"/>
    <text x="16" y="28" font-family="sans-serif" font-size="10" fill="#9ca3af">На сервис</text>
    <text x="16" y="56" font-family="sans-serif" font-size="28" font-weight="700" fill="#f59e0b">2</text>
  </g>
  <g transform="translate(410, 192)">
    <rect width="155" height="86" rx="10" fill="#ef4444" opacity="0.04"/>
    <text x="16" y="28" font-family="sans-serif" font-size="10" fill="#9ca3af">Истекува регистр.</text>
    <text x="16" y="56" font-family="sans-serif" font-size="28" font-weight="700" fill="#ef4444">1</text>
    <text x="48" y="56" font-family="sans-serif" font-size="10" fill="#ef4444">за 5 дена</text>
  </g>
  <g transform="translate(585, 192)">
    <rect width="155" height="86" rx="10" fill="#22c55e" opacity="0.04"/>
    <text x="16" y="28" font-family="sans-serif" font-size="10" fill="#9ca3af">Слободни</text>
    <text x="16" y="56" font-family="sans-serif" font-size="28" font-weight="700" fill="#22c55e">5</text>
  </g>
</svg>
