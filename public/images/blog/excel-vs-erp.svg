<svg viewBox="0 0 800 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="320" rx="16" fill="#f8f9fa"/>

  <!-- Left side: Excel chaos -->
  <g transform="translate(60, 40)">
    <!-- Scattered spreadsheets -->
    <rect x="0" y="20" width="120" height="80" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <rect x="8" y="32" width="40" height="6" rx="2" fill="#22c55e" opacity="0.4"/>
    <rect x="8" y="44" width="104" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="8" y="54" width="80" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="8" y="64" width="96" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="8" y="74" width="60" height="4" rx="2" fill="#e5e7eb"/>

    <rect x="40" y="60" width="120" height="80" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(-6 100 100)"/>
    <rect x="80" y="100" width="120" height="80" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" transform="rotate(4 140 140)"/>

    <!-- Red X marks -->
    <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <line x1="150" y1="30" x2="162" y2="42"/>
      <line x1="162" y1="30" x2="150" y2="42"/>
    </g>
    <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
      <line x1="180" y1="80" x2="192" y2="92"/>
      <line x1="192" y1="80" x2="180" y2="92"/>
    </g>

    <!-- Question marks -->
    <text x="130" y="170" font-family="sans-serif" font-size="28" font-weight="700" fill="#d1d5db">?</text>
    <text x="200" y="140" font-family="sans-serif" font-size="20" font-weight="700" fill="#d1d5db">?</text>

    <text x="60" y="220" font-family="sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle">Расфрлани табели</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(370, 120)">
    <line x1="0" y1="20" x2="50" y2="20" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="42,12 54,20 42,28" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right side: ERP order -->
  <g transform="translate(460, 40)">
    <!-- Clean dashboard -->
    <rect x="0" y="0" width="260" height="200" rx="12" fill="#fff" stroke="#7c3aed" stroke-width="1.5" opacity="0.2"/>
    <rect x="0" y="0" width="260" height="200" rx="12" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="260" height="36" rx="12" fill="#7c3aed" opacity="0.08"/>
    <circle cx="20" cy="18" r="5" fill="#7c3aed" opacity="0.3"/>
    <rect x="34" y="14" width="60" height="8" rx="3" fill="#7c3aed" opacity="0.2"/>

    <!-- Organized rows -->
    <g transform="translate(16, 50)">
      <circle cx="8" cy="8" r="8" fill="#22c55e" opacity="0.15"/>
      <path d="M4 8 L7 11 L12 5" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <rect x="24" y="4" width="80" height="6" rx="2" fill="#e5e7eb"/>
      <rect x="160" y="4" width="50" height="6" rx="2" fill="#7c3aed" opacity="0.15"/>
    </g>
    <g transform="translate(16, 80)">
      <circle cx="8" cy="8" r="8" fill="#22c55e" opacity="0.15"/>
      <path d="M4 8 L7 11 L12 5" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <rect x="24" y="4" width="100" height="6" rx="2" fill="#e5e7eb"/>
      <rect x="160" y="4" width="40" height="6" rx="2" fill="#7c3aed" opacity="0.15"/>
    </g>
    <g transform="translate(16, 110)">
      <circle cx="8" cy="8" r="8" fill="#22c55e" opacity="0.15"/>
      <path d="M4 8 L7 11 L12 5" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <rect x="24" y="4" width="70" height="6" rx="2" fill="#e5e7eb"/>
      <rect x="160" y="4" width="55" height="6" rx="2" fill="#7c3aed" opacity="0.15"/>
    </g>
    <g transform="translate(16, 140)">
      <circle cx="8" cy="8" r="8" fill="#f59e0b" opacity="0.15"/>
      <rect x="3" y="6" width="10" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
      <rect x="24" y="4" width="90" height="6" rx="2" fill="#e5e7eb"/>
      <rect x="160" y="4" width="45" height="6" rx="2" fill="#f59e0b" opacity="0.15"/>
    </g>
    <g transform="translate(16, 170)">
      <circle cx="8" cy="8" r="8" fill="#22c55e" opacity="0.15"/>
      <path d="M4 8 L7 11 L12 5" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <rect x="24" y="4" width="110" height="6" rx="2" fill="#e5e7eb"/>
      <rect x="160" y="4" width="35" height="6" rx="2" fill="#7c3aed" opacity="0.15"/>
    </g>

    <text x="130" y="260" font-family="sans-serif" font-size="14" font-weight="600" fill="#7c3aed" text-anchor="middle">Еден систем, сè на место</text>
  </g>
</svg>
